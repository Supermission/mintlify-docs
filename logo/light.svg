<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 40" fill="none">
  <!-- Icon: ascending staircase blocks (36x36) -->
  <g transform="translate(2, 2)">
    <!-- Outer L-bracket: top bar + right bar -->
    <path d="M0,0 H36 V36 H28 V8 H0 Z" fill="#2563EB" fill-rule="evenodd"/>
    <!-- Middle L-bracket: top bar + right bar -->
    <path d="M0,14 H22 V36 H14 V22 H0 Z" fill="#2563EB" fill-rule="evenodd"/>
    <!-- Inner block -->
    <rect x="0" y="28" width="8" height="8" fill="#2563EB"/>
  </g>
  <!-- "Supermission" wordmark -->
  <text x="48" y="29" font-family="'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif" font-size="23" font-weight="700" fill="#1a1a1a" letter-spacing="-0.03em">Supermission</text>
</svg>